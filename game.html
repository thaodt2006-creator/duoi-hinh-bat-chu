<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chơi game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">

    <!-- PHẦN 1: THANH THÔNG TIN ĐIỂM VÀ SỐ CÂU -->
    <div class="top-bar">
        <div>Điểm: <span id="score">0</span></div>
        <div><span id="currentQuestion">1</span>/<span id="totalQuestion">2</span></div>
    </div>

    <!-- PHẦN 2: KHU VỰC CHƠI GAME -->
    <div class="game-content">

        <div class="left-panel">
            <h1 id="questionTitle">Câu 1</h1>

            <h2 id="hintText">Đáp án có 4 chữ</h2>

            <button id="micButton">
                🎙️ Nhấn để trả lời
            </button>

            <p id="speechText">Chưa có dữ liệu</p>

            <p id="messageText">Hãy nhấn micro để bắt đầu</p>

            <div class="nav-buttons">
                <button id="prevButton">
                    ⬅️ Câu trước
                </button>
                <button id="nextButton">
                    ➡️ Câu tiếp theo
                </button>
            </div>

            <button id="homeButton" onclick="window.location.href='batdau.html'">
                🏠 Trang chủ
            </button>
        </div>

        <div class="right-panel">
            <img id="questionImage" src="" alt="Ảnh câu đố">
        </div>

    </div>

    <audio id="ttsAudio"></audio>

    <!-- PHẦN 3: JAVASCRIPT ĐỌC DỮ LIỆU, HIỂN THỊ CÂU HỎI VÀ THU ÂM -->
    <script>
        const BACKEND_URL = "";

        let questions = [];
        let currentIndex = 0;
        let score = 0;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        const daChamDiem = new Set();

        const micButton = document.getElementById("micButton");
        const messageText = document.getElementById("messageText");
        const speechText = document.getElementById("speechText");

        fetch("metadata.json")
            .then(response => response.json())
            .then(data => {
                questions = data.questions;
                document.getElementById("totalQuestion").innerText = questions.length;
                loadQuestion();
            });

        function loadQuestion() {
            const question = questions[currentIndex];

            document.getElementById("currentQuestion").innerText = currentIndex + 1;
            document.getElementById("questionTitle").innerText = "Câu " + (currentIndex + 1);
            document.getElementById("questionImage").src = question.image;

            const wordCount = question.keyword.trim().split(" ").length;
            document.getElementById("hintText").innerText = "Đáp án có " + wordCount + " chữ";

            speechText.innerText = "Chưa có dữ liệu";
            messageText.innerText = "Hãy nhấn micro để bắt đầu";
        }

        function docTTS(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }

        function ketThucGame() {
            const soCauDung = daChamDiem.size;
            const tongCau = questions.length;
            const ketQuaText = `Trò chơi kết thúc! Bạn đã trả lời đúng ${soCauDung} trên ${tongCau} câu.`;

            document.getElementById("questionTitle").innerText = "Hoàn thành!";
            document.getElementById("hintText").innerText = "";
            document.getElementById("questionImage").style.display = "none";
            micButton.disabled = true;
            document.getElementById("prevButton").disabled = true;
            document.getElementById("nextButton").disabled = true;
            document.getElementById("homeButton").style.display = "block";
            messageText.innerText = ketQuaText;

            setTimeout(() => docTTS(ketQuaText), 600);
        }

        async function batDauThuAm() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(track => track.stop());
                const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                guiAmThanhLenServer(audioBlob);
            };

            mediaRecorder.start();
            isRecording = true;
            micButton.innerText = "⏹️ Nhấn để dừng";
            messageText.innerText = "Đang thu âm...";
        }

        function dungThuAm() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micButton.innerText = "🎙️ Nhấn để trả lời";
                messageText.innerText = "Đang xử lý...";
            }
        }

        async function guiAmThanhLenServer(audioBlob) {
            const question = questions[currentIndex];
            const formData = new FormData();
            formData.append("audio_file", audioBlob, "ghi_am.webm");
            formData.append("id_cau_hoi", question.id);

            try {
                const res = await fetch(`${BACKEND_URL}/api/cham-diem`, {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();

                if (data.error) {
                    messageText.innerText = data.error;
                    return;
                }

                speechText.innerText = `Bạn nói: "${data.asr_nghe_duoc}"`;

                if (data.file_phan_hoi_url) {
                    const ttsAudio = document.getElementById("ttsAudio");
                    ttsAudio.src = BACKEND_URL + data.file_phan_hoi_url + "?t=" + Date.now();
                    ttsAudio.play();
                }

                if (data.ket_qua === "DUNG") {
                    if (!daChamDiem.has(currentIndex)) {
                        daChamDiem.add(currentIndex);
                        score += question.points || 0;
                        document.getElementById("score").innerText = score;
                    }
                    messageText.innerText = "Chính xác!";
                } else {
                    messageText.innerText = "Chưa chính xác, hãy thử lại.";
                }
            } catch (err) {
                messageText.innerText = "Không kết nối được tới server.";
            }
        }

        micButton.addEventListener("click", function () {
            if (!isRecording) {
                batDauThuAm();
            } else {
                dungThuAm();
            }
        });

        document.getElementById("prevButton").addEventListener("click", function () {
            if (currentIndex > 0) {
                currentIndex--;
                loadQuestion();
            }
        });

        document.getElementById("nextButton").addEventListener("click", function () {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                ketThucGame();
            }
        });
    </script>

</body>

</html>
